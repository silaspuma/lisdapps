<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lisdapps</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --accent-blue: #0a84ff;
            --glass-border: rgba(255, 255, 255, 0.1);
            --success-green: #30d158; /* Added for banner */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column; /* Changed to allow banner at top */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NEW: Success Banner Styling --- */
        #success-banner {
            display: none; /* Hidden by default */
            background: rgba(48, 209, 88, 0.15);
            border: 1px solid var(--success-green);
            color: var(--success-green);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            max-width: 360px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        .header-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
            transition: background 0.2s;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
            text-align: left;
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            transition: transform 0.2s ease;
            text-align: left;
        }

        .project-card:hover {
            transform: scale(1.02);
        }

        .icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            margin-right: 16px;
            object-fit: cover;
        }

        .info {
            flex-grow: 1;
        }

        .project-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .progress-container {
            background: #3a3a3c;
            height: 6px;
            width: 100%;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            background: var(--accent-blue);
            height: 100%;
            width: 0%;
            transition: width 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .percentage {
            font-size: 13px;
            color: var(--text-dim);
            margin-left: 12px;
            min-width: 35px;
            text-align: right;
        }

        .action-button {
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            margin-left: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .action-button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div id="success-banner"></div>

<div class="container">
    <a href="https://tally.so/r/QK5y0X" target="_blank" class="header-btn">submit a request</a>
    
    <h1>status of my current projects :3</h1>

    <div class="project-card">
        <img src="tiktok.png" alt="TikTok" class="icon" onerror="this.src='https://via.placeholder.com/48?text=TT'">
        <div class="info">
            <div class="project-name">tiktok</div>
            <div class="progress-container">
                <div class="progress-fill" data-percent="50"></div>
            </div>
        </div>
        <div class="percentage">50%</div>
    </div>

    <div class="project-card">
        <img src="spotify.png" alt="Spotify" class="icon" onerror="this.src='https://via.placeholder.com/48?text=SP'">
        <div class="info">
            <div class="project-name">spotify</div>
            <div class="progress-container">
                <div class="progress-fill" data-percent="75"></div>
            </div>
        </div>
        <div class="percentage">75%</div>
    </div>

    <div class="project-card">
        <img src="tateify.png" alt="Tateify" class="icon" onerror="this.src='https://via.placeholder.com/48?text=TF'">
        <div class="info">
            <div class="project-name">tateify</div>
            <div class="progress-container">
                <div class="progress-fill" data-percent="100"></div>
            </div>
        </div>
        <div class="percentage">100%</div>
        <a href="https://tateify.netlify.app" target="_blank" class="action-button">Open</a>
    </div>

    <div class="project-card">
        <img src="chatgpt.png" alt="ChatGPT" class="icon" onerror="this.src='https://via.placeholder.com/48?text=AI'">
        <div class="info">
            <div class="project-name">chatgpt</div>
            <div class="progress-container">
                <div class="progress-fill" data-percent="3"></div>
            </div>
        </div>
        <div class="percentage">3%</div>
    </div>

    <div class="project-card">
        <img src="netflix.png" alt="Netflix" class="icon" onerror="this.src='https://via.placeholder.com/48?text=NF'">
        <div class="info">
            <div class="project-name">netflix</div>
            <div class="progress-container">
                <div class="progress-fill" data-percent="0"></div>
            </div>
        </div>
        <div class="percentage">0%</div>
    </div>
</div>

<script>
    window.onload = () => {
        // 1. Handle Progress Bars
        const bars = document.querySelectorAll('.progress-fill');
        bars.forEach(bar => {
            const percentage = bar.getAttribute('data-percent');
            bar.style.width = percentage + '%';
        });

        // 2. Handle Success Message from URL
        const urlParams = new URLSearchParams(window.location.search);
        const featureName = urlParams.get('feature'); // Looks for ?feature=name

        if (featureName) {
            const banner = document.getElementById('success-banner');
            banner.innerHTML = `thanks for submitting! we'll start working on <b>${decodeURIComponent(featureName)}</b>`;
            banner.style.display = 'block';
            
            // Optional: Clean the URL so the banner doesn't stay if they refresh
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    };
</script>

</body>
</html>
